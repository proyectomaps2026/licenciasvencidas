<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carga Licencias</title>
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    <style>
        body { 
            margin: 0; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background-color: #DC2626; /* Fondo rojo solicitado */
            background-repeat: no-repeat; background-position: center;
        }

        /* PC: Imagen ajustada */
        @media (min-width: 601px) { 
            body { background-image: url('TU_URL_PC'); background-size: contain; } 
        }
        
        /* MÓVIL: Imagen reducida al 85% para ver bordes rojos */
        @media (max-width: 600px) { 
            body { 
                background-image: url('TU_URL_MOVIL'); 
                background-size: 85% auto; 
            } 
            #btn_subir { padding: 10px 20px !important; font-size: 14px !important; }
        }
        
        #btn_subir { 
            padding: 15px 30px; font-size: 18px;
            background: rgba(0, 0, 0, 0.4); border: 2px solid white;
            color: white; border-radius: 12px; cursor: pointer; font-weight: bold;
            display: flex; align-items: center; gap: 10px;
        }
    </style>
</head>
<body>

    <button id="btn_subir">📷 CARGAR LICENCIA</button>

    <script>
        // Configuración blindada para forzar cámara trasera y asegurar funcionalidad
        const widget = cloudinary.createUploadWidget({
            cloudName: 'dllkhcwzt',
            uploadPreset: 'licencias vencidas',
            sources: ['camera', 'local'], // Habilita cámara y archivos
            showAdvancedOptions: true,     // Obliga a mostrar opciones de cámara
            cropping: false,
            multiple: false,
            clientAllowedFormats: ["jpg", "jpeg", "png"],
            cameraParameters: { capture: 'environment' } // Fuerza cámara trasera
        }, (error, result) => {
            if (!error && result && result.event === "success") {
                alert("¡Licencia subida con éxito!");
            }
        });

        // Evento de disparo seguro
        document.getElementById("btn_subir").addEventListener("click", function() {
            widget.open();
        });
    </script>
</body>
</html>
