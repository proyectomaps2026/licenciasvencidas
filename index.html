<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Carga Licencias Vencidas</title>
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript" defer></script>
    <style>
        * { box-sizing: border-box; }
        body { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; margin: 0; font-family: sans-serif; overflow: hidden;
            background-repeat: no-repeat; background-attachment: fixed; background-position: center center;
            background-color: #1a4d2e; 
        }

        /* FONDO PC (Horizontal) */
        @media (min-width: 601px) { body { background-image: url('https://res.cloudinary.com/dllkhcwzt/image/upload/v1772833240/nzxbwtgbj7xwwohsmyxa.png'); background-size: cover; } }
        /* FONDO MÓVIL (Vertical) */
        @media (max-width: 600px) { body { background-image: url('https://res.cloudinary.com/dllkhcwzt/image/upload/v1772837299/tkeqdm1bqltr7wr4i3oe.png'); background-size: contain; background-position: top center; } }
        
        #btn_subir { 
            padding: 20px 40px; font-size: 20px; background: #dc2626; color: white; 
            border: none; border-radius: 15px; cursor: pointer; font-weight: bold;
            display: flex; align-items: center; gap: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            transition: 0.2s; z-index: 10;
        }
        #btn_subir:active { transform: scale(0.95); }
        .icon-cam { width: 28px; height: 28px; fill: none; stroke: white; stroke-width: 2.5; }

        #resultado { 
            margin-top: 25px; display: none; text-align: center; width: 90%; max-width: 400px; 
            background: rgba(0, 0, 0, 0.85); padding: 20px; border-radius: 15px; border: 1px solid #ffffff33; backdrop-filter: blur(5px);
        }
        #linkGenerado { width: 100%; padding: 12px; background: #000; color: #00ff00; border: 1px solid #333; border-radius: 8px; text-align: center; font-family: monospace; font-size: 13px; margin-bottom: 12px; }
        #btn_copiar { width: 100%; padding: 12px; background: #059669; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <button id="btn_subir">
        <svg class="icon-cam" viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
        LICENCIAS VENCIDAS
    </button>

    <div id="resultado">
        <input type="text" id="linkGenerado" readonly>
        <button id="btn_copiar">📋 COPIAR LINK</button>
    </div>

    <script type="text/javascript">
        window.addEventListener('load', () => {
            const widget = cloudinary.createUploadWidget({
                cloudName: 'dllkhcwzt',
                uploadPreset: 'licencias vencidas',
                sources: ['camera', 'local'], // Permite cámara Y archivos
                clientAllowedFormats: ["jpg", "jpeg", "png"], // PROHÍBE VIDEO
                cameraParameters: { capture: 'environment' }, // Forzar cámara trasera
                language: "es",
                text: { "es": { "menu": { "camera": "Tomar Foto", "local": "Buscar en Archivos" } } },
                styles: { palette: { window: "#000000", sourceBg: "#000000", action: "#DC2626" } }
            }, (error, result) => {
                if (!error && result && result.event === "success") {
                    const resDiv = document.getElementById('resultado');
                    const linkInput = document.getElementById('linkGenerado');
                    
                    // COMPRESIÓN SÚPER RÁPIDA: f_auto,q_auto
                    let urlFinal = result.info.secure_url.replace("/upload/", "/upload/f_auto,q_auto/");
                    
                    resDiv.style.display = 'block';
                    linkInput.value = urlFinal;
                }
            });

            document.getElementById("btn_subir").addEventListener("click", () => widget.open());document.getElementById("btn_copiar").addEventListener("click", () => {
                const link = document.getElementById("linkGenerado");
                link.select();
                navigator.clipboard.writeText(link.value);
                const btn = document.getElementById("btn_copiar");
                btn.innerText = "✅ ¡COPIADO!";
                setTimeout(() => btn.innerText = "📋 COPIAR LINK", 2000);
            });
        });
    </script>
</body>
</html>
