<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carga Licencias</title>
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    <style>
        body { 
            margin: 0; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background-repeat: no-repeat; background-attachment: fixed; background-position: center;
            background-color: #1a4d2e;
        }
        
        /* PC */
        @media (min-width: 601px) { body { background-image: url('TU_URL_PC'); background-size: cover; } }
        
        /* MÓVIL: Botón más pequeño para ver logos */
        @media (max-width: 600px) { 
            body { background-image: url('TU_URL_MOVIL'); background-size: cover; } 
            #btn_subir { padding: 12px 20px !important; font-size: 16px !important; }
        }

        #btn_subir { 
            padding: 20px 40px; font-size: 20px;
            background: rgba(220, 38, 38, 0.6);
            backdrop-filter: blur(5px);
            border: 2px solid rgba(255, 255, 255, 0.5);
            color: white; border-radius: 15px; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>

    <button id="btn_subir">LICENCIAS VENCIDAS</button>

    <script>
        const widget = cloudinary.createUploadWidget({
            cloudName: 'dllkhcwzt',
            uploadPreset: 'licencias vencidas',
            sources: ['camera', 'local'],
            clientAllowedFormats: ["jpg", "jpeg", "png"],
            cameraParameters: { capture: 'environment' },
            language: "es",
            text: { "es": { "menu": { "camera": "Tomar Foto", "local": "Buscar Archivos" } } }
        }, (error, result) => {
            if (!error && result && result.event === "success") {
                alert("Subido: " + result.info.secure_url.replace("/upload/", "/upload/f_auto,q_auto/"));
            }
        });

        document.getElementById("btn_subir").addEventListener("click", () => widget.open());
    </script>
</body>
</html>
