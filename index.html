<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carga Licencias</title>
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript" defer></script>
    <style>
        body { 
            margin: 0; padding: 0; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background-repeat: no-repeat; background-attachment: fixed;
            background-color: #1a4d2e;
        }

        /* FONDO PC */
        @media (min-width: 601px) { 
            body { background-image: url('https://res.cloudinary.com/dllkhcwzt/image/upload/v1772833240/nzxbwtgbj7xwwohsmyxa.png'); background-size: cover; background-position: center; } 
        }

        /* FONDO MÓVIL: Forzamos 'cover' y centrado para que no se deforme */
        @media (max-width: 600px) { 
            body { background-image: url('https://res.cloudinary.com/dllkhcwzt/image/upload/v1772837299/tkeqdm1bqltr7wr4i3oe.png'); background-size: cover; background-position: center; } 
        }

        /* BOTÓN GLASSMORPHISM REAL */
        #btn_subir { 
            padding: 20px 40px; font-size: 20px;
            /* Color rojo con transparencia real */
            background: rgba(220, 38, 38, 0.4); 
            /* Desenfoque de fondo (Glass) */
            backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white; border-radius: 20px; cursor: pointer; font-weight: bold;
            display: flex; align-items: center; gap: 12px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            transition: 0.3s; z-index: 10;
        }
        #btn_subir:hover { background: rgba(220, 38, 38, 0.6); }

        #resultado { 
            margin-top: 25px; display: none; text-align: center; width: 90%; max-width: 400px; 
            background: rgba(0, 0, 0, 0.6); padding: 20px; border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px);
        }
        #linkGenerado { width: 100%; padding: 12px; background: rgba(0,0,0,0.5); color: #00ff00; border: 1px solid #333; border-radius: 8px; text-align: center; font-family: monospace; }
        #btn_copiar { width: 100%; padding: 12px; background: #059669; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <button id="btn_subir">
        <svg style="width:28px; height:28px; fill:none; stroke:white; stroke-width:2.5;" viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
        LICENCIAS VENCIDAS
    </button>

    <div id="resultado">
        <input type="text" id="linkGenerado" readonly>
        <button id="btn_copiar">📋 COPIAR LINK</button>
    </div>

    <script type="text/javascript">
        window.addEventListener('load', () => {
            const widget = cloudinary.createUploadWidget({
                cloudName: 'dllkhcwzt',
                uploadPreset: 'licencias vencidas',
                sources: ['camera', 'local'],
                clientAllowedFormats: ["jpg", "jpeg", "png"],
                cameraParameters: { capture: 'environment' },
                language: "es",
                text: { "es": { "menu": { "camera": "Tomar Foto", "local": "Buscar Archivos" } } }
            }, (error, result) => {
                if (!error && result && result.event === "success") {
                    document.getElementById('resultado').style.display = 'block';
                    document.getElementById('linkGenerado').value = result.info.secure_url.replace("/upload/", "/upload/f_auto,q_auto/");
                }
            });document.getElementById("btn_copiar").addEventListener("click", () => {
                const link = document.getElementById("linkGenerado");
                link.select();
                navigator.clipboard.writeText(link.value);
                const btn = document.getElementById("btn_copiar");
                btn.innerText = "✅ ¡COPIADO!";
                setTimeout(() => btn.innerText = "📋 COPIAR LINK", 2000);
            });
        });
    </script>
</body>
</html>

            document.getElementById("btn_subir").addEventListener("click", () => widget.open());
