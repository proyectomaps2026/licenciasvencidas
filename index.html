<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carga Licencias Vencidas</title>
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    <style>
        body { 
            margin: 0; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background-repeat: no-repeat; background-attachment: fixed;
            background-position: center center; background-color: #1a4d2e;
        }

        /* FONDO PC: cover para llenar espacio */
        @media (min-width: 601px) { 
            body { background-image: url('https://res.cloudinary.com/dllkhcwzt/image/upload/v1772833240/nzxbwtgbj7xwwohsmyxa.png'); background-size: cover; } 
        }

        /* FONDO MÓVIL: Ajuste compacto */
        @media (max-width: 600px) { 
            body { background-image: url('https://res.cloudinary.com/dllkhcwzt/image/upload/v1772837299/tkeqdm1bqltr7wr4i3oe.png'); background-size: cover; } 
            #btn_subir { padding: 8px 16px !important; font-size: 14px !important; }
        }

        /* BOTÓN PROFESIONAL */
        #btn_subir { 
            padding: 15px 30px; font-size: 18px;
            background: rgba(220, 38, 38, 0.7);
            backdrop-filter: blur(5px);
            border: 2px solid rgba(255, 255, 255, 0.5);
            color: white; border-radius: 12px; cursor: pointer; font-weight: bold;
            display: flex; align-items: center; gap: 10px;
            transition: 0.3s;
        }
        #btn_subir:hover { background: rgba(220, 38, 38, 0.9); }
    </style>
</head>
<body>

    <button id="btn_subir">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
            <circle cx="12" cy="13" r="4"></circle>
        </svg>
        LICENCIAS VENCIDAS
    </button>

    <script>
        const widget = cloudinary.createUploadWidget({
            cloudName: 'dllkhcwzt',
            uploadPreset: 'licencias vencidas',
            sources: ['camera', 'local'],
            clientAllowedFormats: ["jpg", "jpeg", "png"],
            cameraParameters: { capture: 'environment' },
            styles: {
                palette: { window: "#000000", action: "#DC2626" }
            },
            language: "es",
            text: { "es": { "menu": { "camera": "Tomar Foto", "local": "Buscar Archivos" } } }
        }, (error, result) => {
            if (!error && result && result.event === "success") {
                alert("Subido exitosamente: " + result.info.secure_url);
            }
        });

        document.getElementById("btn_subir").addEventListener("click", () => widget.open());
    </script>
</body>
</html>
