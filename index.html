<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carga Licencias</title>
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    <style>
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: #E3F2FD !important; }
        #btn_subir { padding: 15px 30px; font-size: 18px; background: rgba(0, 0, 0, 0.4); border: 2px solid white; color: white; border-radius: 12px; cursor: pointer; font-weight: bold; }
        #resultado { display: none; margin-top: 20px; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px; color: white; text-align: center; }
    </style>
</head>
<body>

    <button id="btn_subir">CARGAR LICENCIA</button>

    <div id="resultado">
        <input type="text" id="linkGenerado" readonly>
    </div>

    <script>
        const widget = cloudinary.createUploadWidget({
            cloudName: 'dllkhcwzt',
            uploadPreset: 'licencias vencidas',
            // La configuración más limpia posible para móviles
            sources: ['camera', 'local'],
            defaultSource: 'camera'
        }, (error, result) => {
            if (!error && result && result.event === "success") {
                document.getElementById('resultado').style.display = 'block';
                document.getElementById('linkGenerado').value = result.info.secure_url;
            }
        });

        document.getElementById("btn_subir").addEventListener("click", () => widget.open());
    </script>
</body>
</html>
