<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carga Licencias</title>
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    <style>
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: #E3F2FD; }
        
        /* Ajuste 98% para línea fina */
        @media (min-width: 601px) { body { background-image: url('https://res.cloudinary.com/dllkhcwzt/image/upload/v1772833240/nzxbwtgbj7xwwohsmyxa.png'); background-size: 98% auto; } }
        @media (max-width: 600px) { body { background-image: url('https://res.cloudinary.com/dllkhcwzt/image/upload/v1772837299/tkeqdm1bqltr7wr4i3oe.png'); background-size: 98% auto; } }

        #btn_subir { padding: 15px 30px; font-size: 18px; background: rgba(0, 0, 0, 0.4); border: 2px solid white; color: white; border-radius: 12px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 10px; }
        #resultado { display: none; margin-top: 20px; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px; }
        #btn_copiar { background: #2563EB; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

    <button id="btn_subir">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
        CARGAR LICENCIA
    </button>

    <div id="resultado">
        <input type="text" id="linkGenerado" readonly>
        <button id="btn_copiar">📋 COPIAR LINK</button>
    </div>

    <script>
        // CONFIGURACIÓN ABIERTA: Dejamos que Cloudinary decida la mejor opción según el dispositivo
        const widget = cloudinary.createUploadWidget({
            cloudName: 'dllkhcwzt',
            uploadPreset: 'licencias vencidas',
            // Al quitar 'sources', el widget usa sus defaults que son los más compatibles
            showAdvancedOptions: true
        }, (error, result) => {
            if (!error && result && result.event === "success") {
                document.getElementById('resultado').style.display = 'block';
                document.getElementById('linkGenerado').value = result.info.secure_url;
            }
        });

        document.getElementById("btn_subir").addEventListener("click", () => widget.open());
        document.getElementById("btn_copiar").addEventListener("click", () => {
            const link = document.getElementById("linkGenerado");
            link.select();
            document.execCommand("copy");
        });
    </script>
</body>
</html>
