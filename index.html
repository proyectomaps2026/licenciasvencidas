<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Carga Licencias Vencidas</title>
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    <style>
        body { 
            background: url('https://res.cloudinary.com/dllkhcwzt/image/upload/v1772833240/nzxbwtgbj7xwwohsmyxa.png') no-repeat center center fixed; 
            background-size: cover;
            display: flex; align-items: center; justify-content: center; 
            height: 100vh; margin: 0; font-family: sans-serif; 
        }
        
        #btn_subir { 
            padding: 20px 40px; font-size: 22px; background: #dc2626; color: white; 
            border: none; border-radius: 15px; cursor: pointer; font-weight: bold;
            display: flex; align-items: center; gap: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        
        .icon-cam { width: 30px; height: 30px; fill: none; stroke: white; stroke-width: 2; }

        #resultado { margin-top: 25px; display: none; text-align: center; width: 80%; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 10px;}
        #linkGenerado { width: 100%; padding: 12px; background: #1e293b; color: white; border: 1px solid #475569; border-radius: 8px; text-align: center; box-sizing: border-box; }
        #btn_copiar { margin-top: 15px; padding: 12px 20px; background: #059669; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <button id="btn_subir">
        <svg class="icon-cam" viewBox="0 0 24 24">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
            <circle cx="12" cy="13" r="4"></circle>
        </svg>
        LICENCIAS VENCIDAS
    </button>

    <div id="resultado">
        <input type="text" id="linkGenerado" readonly>
        <br>
        <button id="btn_copiar" onclick="copiarLink()">📋 COPIAR LINK</button>
    </div>

    <script type="text/javascript">
        // Widget configurado para abrir la cámara primero
        const widget = cloudinary.createUploadWidget({
            cloudName: 'dllkhcwzt',
            uploadPreset: 'licencias vencidas',
            sources: ['camera', 'local'], // Prioriza 'camera'
            showAdvancedOptions: false,
            cropping: true
        }, (error, result) => {
            if (!error && result && result.event === "success") {
                document.getElementById('resultado').style.display = 'block';
                document.getElementById('linkGenerado').value = result.info.secure_url;
            }
        });

        document.getElementById("btn_subir").addEventListener("click", () => {
            widget.open();
        });

        function copiarLink() {
            const copyText = document.getElementById("linkGenerado");
            copyText.select();
            document.execCommand("copy");
            alert("¡Link copiado al portapapeles!");
        }
    </script>
</body>
</html>
